$schema: https://json-schema.org/draft/2020-12/schema
title: Basemap Instrument Detail
description: Basemap images with RGB channels and pixel scaling. (Extension type,
  not in v3 source schema.)
type: object
properties:
  '@type':
    type: array
    minItems: 2
    allOf:
    - contains:
        const: ada:basemap
    - contains:
        const: schema:Map
  schema:description:
    type: string
  ada:pixelUnits:
    type: string
  ada:pixelScaleX:
    type: number
  ada:pixelScaleY:
    type: number
  ada:channel1:
    type: string
  ada:channel2:
    type: string
  ada:channel3:
    type: string
required:
- '@type'
- ada:pixelScaleX
- ada:pixelScaleY
- ada:pixelUnits
x-jsonld-prefixes:
  schema: http://schema.org/
  ada: https://ada.astromat.org/metadata/
