  cdif.bbr.metadata.schemaorgProperties.webAPI:
    title: Direct data access to a resource via web servcie
    description: use schema.org Action to document url or url template and parameters
      to request data through a web accessible location. At this point, schema is
      set up for one action-- an HTTP Get that requests data. The url template parameters
      (in curly brackets '{}') specify query paramters to filter the source data,
      request particular output formats or other aspects of data.
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:WebAPI
        minItems: 1
      schema:serviceType:
        anyOf:
        - type: string
        - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.webAPI/$defs/DefinedTerm
        description: specify the kind of service. Ideally this should be a resolvable
          identifier. Currently there is no widely adopted registry for serviceType
          identifiers, in large part because services might be defined at different
          levels of granularity, and classifications might focus on function, data
          formats, thematic content, security, or other aspects of the service definition.
          For interoperability, there must be an external arrangement between data
          providers and consumers on the strings that will be used to specify service
          types.
      schema:termsOfService:
        description: Description of access privileges required to use the API, e.g.
          registration, licensing, payments. Note that access constraints applying
          to all distributions of the resource should be specified in the access constraints
          for the resource description as a whole.
        oneOf:
        - type: string
