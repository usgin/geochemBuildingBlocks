$schema: https://json-schema.org/draft/2020-12/schema
title: ADA Analysis Laboratory
description: >-
  ADA laboratory or facility building block. Extends the core CDIF spatialExtent
  (schema:Place) with NeXus NXsource classification via additionalType.
  Inherits place name, identifier, alternateName, geo coordinates, and
  geosparql geometry from spatialExtent.
allOf:
- $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/_sources/schemaorgProperties/spatialExtent/schema.yaml
- type: object
  properties:
    'schema:additionalType':
      type: array
      items:
        type: string
      contains:
        const: "nxs:BaseClass/NXsource"
      description: Must include nxs:BaseClass/NXsource for NeXus facility classification.
