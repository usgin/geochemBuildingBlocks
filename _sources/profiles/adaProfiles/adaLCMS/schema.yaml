$schema: https://json-schema.org/draft/2020-12/schema
title: ADA LC-MS Product Profile
description: Technique-specific profile for Liquid Chromatography Mass Spectrometry (LC-MS) products. Extends the base ADA
  product profile with constraints on valid LC-MS component types.
allOf:
- $ref: ../adaProduct/schema.yaml
- type: object
  properties:
    schema:additionalType:
      description: Must include a LC-MS product type identifier.
      contains:
        enum:
        - Liquid Chromatography - Mass Spectrometry (LCMS) Collection
        - Liquid chromatography-mass spectrometry
    schema:distribution:
      description: Distribution items for adaLCMS. Archive hasPart items must have ada:componentType from technique-specific
        or universal values.
      type: array
      items:
        type: object
        properties:
          schema:hasPart:
            items:
              type: object
              properties:
                ada:componentType:
                  anyOf:
                  - enum:
                    - ada:LCMSCollection
                    - ada:LCMSMSCollection
                  - ? ''
                    : ../adaProduct/schema.yaml#//universalComponentType
    schema:subjectOf:
      properties:
        dcterms:conformsTo:
          contains:
            type: object
            properties:
              '@id':
                const: 'https://w3id.org/geochem/metadata/profiles/adaLCMS'
