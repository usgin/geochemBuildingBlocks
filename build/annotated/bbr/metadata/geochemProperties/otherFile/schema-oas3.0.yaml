x-defs:
  ada.bbr.metadata.geochemProperties.detailSLS:
    title: SLS Instrument Detail
    description: Structured Light Scanning shape models and partial scans
    type: object
    properties:
      '@type':
        anyOf:
        - enum:
          - ada:SLSShapeModel
        - enum:
          - ada:SLSPartialScan
      ada:countScans:
        type: integer
      ada:facets:
        type: integer
      ada:unitsOfMeasurement:
        type: string
      ada:version:
        type: integer
      ada:vertices:
        type: integer
      ada:watertight:
        type: boolean
    x-jsonld-prefixes:
      schema: http://schema.org/
      ada: https://ada.astromat.org/metadata/
    x-schema-source: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/geochemProperties/detailSLS/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
title: Other File Type
description: Files in other widely-used formats approved for submission to the Astromat
  Archive. Includes EMSA, OBJ, STL, XLSX, and Neptune Plus export formats.
type: object
properties:
  '@type':
    type: array
    items:
      type: string
    minItems: 1
    contains:
      enum:
      - ada:otherFileType
  ada:componentType:
    anyOf:
    - type: object
      properties:
        '@type':
          enum:
          - ada:other
      required:
      - '@type'
    - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/geochemProperties/otherFile/schema-oas3.0.yaml#/x-defs/ada.bbr.metadata.geochemProperties.detailSLS
  schema:encodingFormat:
    description: 'One of the approved non-standard file formats: ''Spectral Data Exchange
      File (.emsa)''-->text/plain; ''3D model file (.obj)''-->model/obj; ''Standard
      Triangle Language (.stl)''-->model/stl; ''Open XML workbook (.xlsx)''-->application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;
      ''Neptune Plus export (.exp)''-->application/octet-stream'
    enum:
    - text/plain
    - model/obj
    - model/stl
    - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    - application/octet-stream
  ada:formatDescription:
    type: string
    description: Free text explanation of file format, or a link to a publicly accessible
      specification for the format.
required:
- '@type'
- ada:componentType
x-jsonld-prefixes:
  schema: http://schema.org/
  ada: https://ada.astromat.org/metadata/
x-schema-version: https://json-schema.org/draft/2020-12/schema
