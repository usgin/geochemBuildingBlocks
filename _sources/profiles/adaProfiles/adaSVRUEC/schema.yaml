$schema: https://json-schema.org/draft/2020-12/schema
title: ADA SV-RUEC Product Profile
description: Technique-specific profile for Seismic Velocities and Rock Ultrasonic Elastic Constants (SV-RUEC) products. Extends
  the base ADA product profile with constraints on valid SV-RUEC component types.
allOf:
- $ref: ../adaProduct/schema.yaml
- type: object
  properties:
    schema:additionalType:
      description: Must include a SV-RUEC product type identifier.
      contains:
        enum:
        - Seismic Velocities and Rock Ultrasonic Elastic Constants (SVRUEC)
        - Seismic Velocities and Rock Ultrasonic Elastic Constants
    schema:distribution:
      description: Distribution items for adaSVRUEC. Archive hasPart items must have ada:componentType from technique-specific
        or universal values.
      type: array
      items:
        type: object
        properties:
          schema:hasPart:
            items:
              type: object
              properties:
                ada:componentType:
                  anyOf:
                  - enum:
                    - ada:SVRUECTabular
                  - ? ''
                    : ../adaProduct/schema.yaml#//universalComponentType
    schema:subjectOf:
      properties:
        dcterms:conformsTo:
          contains:
            type: object
            properties:
              '@id':
                const: 'https://w3id.org/geochem/metadata/profiles/adaSVRUEC'
