$schema: https://json-schema.org/draft/2020-12/schema
title: ADA EA-IRMS Product Profile
description: Technique-specific profile for Elemental Analysis - Isotope Ratio Mass
  Spectrometry (EA-IRMS) products. Extends the base ADA product profile with constraints
  on valid EA-IRMS component types and detailEAIRMS requirements.
allOf:
- $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaProduct/schema.yaml
- type: object
  properties:
    schema:additionalType:
      description: Must include a EA-IRMS product type identifier.
      contains:
        enum:
        - Elemental Analysis-Isotope Ratio Mass Spectrometry (EA-IRMS)
        - Elemental analysis - isotope ratio mass spectrometry
    schema:distribution:
      description: Distribution items for adaEAIRMS. Archive hasPart items must have
        ada:componentType from technique-specific or universal values.
      type: array
      items:
        type: object
        properties:
          schema:hasPart:
            items:
              type: object
              properties:
                ada:componentType:
                  anyOf:
                  - enum:
                    - ada:EAIRMSCollection
                  - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaProduct/schema.yaml#/$defs/universalComponentType
    schema:subjectOf:
      properties:
        dcterms:conformsTo:
          contains:
            type: object
            properties:
              '@id':
                const: https://w3id.org/geochem/metadata/profiles/adaEAIRMS
x-jsonld-prefixes:
  schema: http://schema.org/
  ada: https://ada.astromat.org/metadata/
  cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
  csvw: http://www.w3.org/ns/csvw#
  prov: http://www.w3.org/ns/prov#
  spdx: http://spdx.org/rdf/terms#
  nxs: http://purl.org/nexusformat/definitions/
  dcterms: http://purl.org/dc/terms/
  geosparql: http://www.opengis.net/ont/geosparql#
