$schema: https://json-schema.org/draft/2020-12/schema
title: ADA GC-MS Product Profile
description: Technique-specific profile for Gas Chromatography Mass Spectrometry (GC-MS)
  products. Extends the base ADA product profile with constraints on valid GC-MS component
  types.
allOf:
- $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaProduct/schema.yaml
- type: object
  properties:
    schema:additionalType:
      description: Must include a GC-MS product type identifier.
      contains:
        enum:
        - Gas Chromatography-Mass Spectrometry (GCMS)
        - Gas Chromatography-Mass Spectrometry
    schema:distribution:
      description: Distribution items for adaGCMS. Archive hasPart items must have
        ada:componentType from technique-specific or universal values.
      type: array
      items:
        type: object
        properties:
          schema:hasPart:
            items:
              type: object
              properties:
                ada:componentType:
                  anyOf:
                  - enum:
                    - ada:GCMSCollection
                    - ada:GCMSCube
                    - ada:GCGCMSCollection
                  - '': ../adaProduct/schema.yaml#//universalComponentType
x-jsonld-prefixes:
  schema: http://schema.org/
  ada: https://ada.astromat.org/metadata/
  cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
  csvw: http://www.w3.org/ns/csvw#
  prov: http://www.w3.org/ns/prov#
  spdx: http://spdx.org/rdf/terms#
  nxs: http://purl.org/nexusformat/definitions/
  dcterms: http://purl.org/dc/terms/
  geosparql: http://www.opengis.net/ont/geosparql#
