$schema: https://json-schema.org/draft/2020-12/schema
title: XCT Instrument Detail
description: X-ray Computed Tomography images with detailed scan parameters. (Extension
  type, not in v3 source schema.)
type: object
properties:
  '@type':
    const: ada:XCTImageCollection
  ada:beamFilterMaterial:
    type: string
  ada:beamFilterThickness:
    type: number
  ada:dataRangeLower:
    type: integer
  ada:dataRangeUpper:
    type: integer
  ada:detectorGain:
    type: string
  ada:detectorBinning:
    type: string
  ada:detectorSize:
    type: string
  ada:detectorType:
    type: string
  ada:imageExposure:
    type: number
  ada:imageFPS:
    type: string
  ada:imageGain:
    type: number
  ada:imageSize:
    type: string
  ada:instrumentType:
    type: string
  ada:nsiBeamHardening:
    type: number
  ada:numberOfFramesAveragedPerProjection:
    type: integer
  ada:numberOfProjections:
    type: integer
  ada:numberOfSlices:
    type: integer
  ada:pixelPitch:
    type: string
  ada:reconstructedDataFormat:
    type: string
  ada:reconstructedVoxelSize:
    type: string
  ada:reconstructionSoftware:
    type: string
  ada:rotationAngle:
    type: string
  ada:rotationType:
    type: string
  ada:sourceToDetectorDistance:
    type: string
  ada:sourceToObjectDistance:
    type: number
  ada:subPixGrid:
    type: string
  ada:subPixShift:
    type: string
  ada:xraySource:
    type: string
  ada:xrayTargetMaterial:
    type: string
  ada:xrayTubeCurrent:
    type: number
  ada:xrayTubeEnergy:
    type: number
  ada:xrayTubePower:
    type: number
x-jsonld-prefixes:
  schema: http://schema.org/
  ada: https://ada.astromat.org/metadata/
