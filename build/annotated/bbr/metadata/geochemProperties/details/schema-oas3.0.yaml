  ada.bbr.metadata.geochemProperties.detailBasemap:
    title: Basemap Instrument Detail
    description: Basemap images with RGB channels and pixel scaling. (Extension type,
      not in v3 source schema.)
    type: object
    properties:
      '@type':
        enum:
        - - ada:basemap
          - schema:Map
      schema:description:
        type: string
      ada:pixelUnits:
        type: string
      ada:pixelScaleX:
        type: number
      ada:pixelScaleY:
        type: number
      ada:channel1:
        type: string
      ada:channel2:
        type: string
      ada:channel3:
        type: string
    required:
    - '@type'
    - ada:pixelScaleX
    - ada:pixelScaleY
    - ada:pixelUnits
    x-jsonld-prefixes:
      schema: http://schema.org/
      ada: https://ada.astromat.org/metadata/
    x-schema-source: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/geochemProperties/detailBasemap/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
