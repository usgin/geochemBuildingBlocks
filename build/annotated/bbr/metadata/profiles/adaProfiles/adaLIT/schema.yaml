$schema: https://json-schema.org/draft/2020-12/schema
title: ADA LIT Product Profile
description: Technique-specific profile for Lock-In Thermography (LIT) products. Extends
  the base ADA product profile with constraints on valid LIT component types.
allOf:
- $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaProduct/schema.yaml
- type: object
  properties:
    schema:additionalType:
      description: Must include a LIT product type identifier.
      contains:
        enum:
        - Lock-In Thermography (LIT) image
        - Lock-In Thermography (LIT) Collection
        - Lock-In Thermography
    schema:distribution:
      description: Distribution items for adaLIT. Archive hasPart items must have
        ada:componentType from technique-specific or universal values.
      type: array
      items:
        type: object
        properties:
          schema:hasPart:
            items:
              type: object
              properties:
                ada:componentType:
                  anyOf:
                  - enum:
                    - ada:LITImage
                    - ada:LIT2DDataCollection
                    - ada:LITPolarDataCollection
                  - '': ../adaProduct/schema.yaml#//universalComponentType
    schema:subjectOf:
      properties:
        dcterms:conformsTo:
          contains:
            type: object
            properties:
              '@id':
                const: https://w3id.org/geochem/metadata/profiles/adaLIT
x-jsonld-prefixes:
  schema: http://schema.org/
  ada: https://ada.astromat.org/metadata/
  cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
  csvw: http://www.w3.org/ns/csvw#
  prov: http://www.w3.org/ns/prov#
  spdx: http://spdx.org/rdf/terms#
  nxs: http://purl.org/nexusformat/definitions/
  dcterms: http://purl.org/dc/terms/
  geosparql: http://www.opengis.net/ont/geosparql#
