        description: Landing page URL for this instrument.
      schema:manufacturer:
        description: Organization that manufactured this instrument.
        allOf:
        - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Organization
      schema:model:
        type: object
        description: Product model information for this instrument.
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - schema:ProductModel
            minItems: 1
          schema:name:
            type: string
            description: Model name or number.
          schema:identifier:
            description: Model identifier.
            anyOf:
            - type: string
            - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Identifier
        required:
        - schema:name
      schema:category:
        description: Instrument type classification(s) from a controlled vocabulary.
        type: array
        items:
          $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/DefinedTerm
      schema:owner:
        description: Organization that owns this instrument.
        allOf:
        - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Organization
      schema:contributor:
        description: Agents associated with this instrument in specific roles (e.g.
