        items:
          $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/AdditionalProperty
      schema:validFrom:
        type: string
        description: Date the instrument was commissioned (ISO 8601).
      schema:validThrough:
        type: string
        description: Date the instrument was decommissioned (ISO 8601). Absent if
          still operational.
      schema:hasPart:
        type: array
        description: Sub-components of this instrument system. Each item is either
