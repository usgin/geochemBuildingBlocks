  cdif.bbr.metadata.schemaorgProperties.instrument:
    title: Instrument Description
    description: Schema for describing laboratory instruments and instrument systems.
      Supports ownership, manufacturer, model, commissioning dates, hierarchical sub-components
      via schema:hasPart, and domain-specific typing. Instruments may be standalone
      devices or complex systems with sub-components.
    type: object
    properties:
      '@context':
        type: object
        description: JSON-LD context declaring namespace prefixes.
        properties:
          schema:
            enum:
            - http://schema.org/
          dcterms:
            enum:
            - http://purl.org/dc/terms/
        required:
        - schema
      '@id':
        type: string
        description: Persistent identifier URI for this instrument metadata record.
      '@type':
        type: array
        items:
          type: string
        minItems: 2
        description: Must include schema:Product and schema:Thing. May include additional
          types.
        allOf:
        - contains:
            enum:
            - schema:Product
        - contains:
            enum:
            - schema:Thing
      schema:additionalType:
        description: Domain-specific type classifications. Should include a scientific
          instrument type URI (e.g. wd:Q3099911 for Wikidata scientific instrument).
        type: array
        items:
          type: string
        minItems: 1
      schema:name:
        type: string
        minLength: 3
        description: Human-readable name for this instrument.
      schema:description:
        type: string
        description: Text description of this instrument, its purpose, and capabilities.
      schema:alternateName:
        description: Alternate name(s), e.g. specific make/model designation, common
          abbreviation.
        type: array
        items:
          type: string
      schema:identifier:
        description: Formal identifier(s) for this instrument. Use PropertyValue for
          structured identifiers (e.g. PIDINST, serial number, inventory number).
        type: array
        items:
          anyOf:
          - type: string
          - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.instrument/$defs/Identifier
