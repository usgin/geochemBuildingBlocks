---
$schema: https://json-schema.org/draft/2020-12/schema
title: Files Type
description: >-
  Properties for any file in an ADA product distribution hasPart.
  These are component files within an archive — they are NOT individually
  downloadable (no schema:contentUrl). The @type must NOT include
  schema:DataDownload. GeneralType provides info based on broad categories
  of file format (tabular, image, dataCube, document).
allOf:
- type: object
  description: Base properties common to all file types in hasPart
  properties:
    '@id':
      type: string
    '@type':
      type: array
      items:
        type: string
      not:
        contains:
          const: "schema:DataDownload"
      minItems: 1
    'schema:additionalType':
      type: array
      description: >-
        Other classifiers for the file. ADA componentTypes are specified
        in the specific file type schemas attached by $refs.
      items:
        type: string
    'schema:name':
      type: string
      description: >-
        String name of file, must be unique within the containing package.
    'schema:description':
      type: string
    'spdx:checksum':
      type: object
      properties:
        'spdx:algorithm':
          type: string
        'spdx:checksumValue':
          type: string
    'schema:size':
      type: object
      properties:
        '@type':
          type: array
          contains:
            const: "schema:QuantitativeValue"
          minItems: 1
        'schema:value':
          type: integer
        'schema:unitText':
          type: string
          default: byte
    'schema:encodingFormat':
      type: array
      items:
        type: string
    'ada:resultTarget':
      $ref: ../stringArray/schema.yaml
    'schema:relatedLink':
      type: array
      description: >-
        Links between files in the product. Use schema:name for path to
        target in product, or use #id JSON-LD links. Used to link metadata
        files in bundle to the data or supplementary files they document.
      items:
        type: object
        properties:
          '@type':
            type: array
            contains:
              const: "schema:LinkRole"
            minItems: 1
          'schema:linkRelationship':
            type: string
          'schema:target':
            type: object
            properties:
              '@type':
                type: array
                contains:
                  const: "schema:EntryPoint"
                minItems: 1
              'schema:encodingFormat':
                type: string
              'schema:name':
                type: string
              'schema:url':
                type: string
- anyOf:
  - $ref: ../image/schema.yaml
  - $ref: ../imageMap/schema.yaml
  - $ref: ../tabularData/schema.yaml
  - $ref: ../collection/schema.yaml
  - $ref: ../dataCube/schema.yaml
  - $ref: ../document/schema.yaml
  - $ref: ../supDocImage/schema.yaml
  - $ref: ../otherFile/schema.yaml
  - type: object
    properties:
      '@type':
        type: array
        contains:
          const: "Metadata"
    required:
    - '@type'
  - type: object
    description: Generic media object (fallback for unrecognized file types)
    properties:
      '@type':
        type: array
        contains:
          const: "schema:MediaObject"
    required:
      - '@type'
