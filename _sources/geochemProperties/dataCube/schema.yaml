---
$schema: https://json-schema.org/draft/2020-12/schema
title: Data Cube Type
description: Multi-dimensional data cube structure using DDI-CDI. Typed as ada:dataCube and cdi:StructuredDataSet
  per CDIF 2026 alignment.
allOf:
- type: object
  properties:
    '@type':
      type: array
      items:
        type: string
      minItems: 2
      allOf:
      - contains:
          const: ada:dataCube
      - contains:
          const: cdi:StructuredDataSet
    'ada:componentType':
      anyOf:
      - type: object
        properties:
          '@type':
            enum:
            - ada:GCMSCollection
            - ada:GCMSCube
            - ada:FTICRMSCube
            - ada:LCMSCollection
            - ada:SEMEBSDGrainImageMapCube
            - ada:SEMEDSElementalMapsCube
            - ada:SEMEDSPointDataCube
            - ada:SEMHRCLCube
            - ada:STEMEDSCube
            - ada:STEMEDSTomo
            - ada:STEMEELSCube
            - ada:VNMIRSpectralMap
        required:
        - '@type'
      - $ref: ../detailL2MS/schema.yaml
    'ada:dataComponentResource':
      type: string
- $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/_sources/cdifProperties/cdifDataCube/schema.yaml