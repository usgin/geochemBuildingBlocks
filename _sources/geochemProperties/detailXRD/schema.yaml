$schema: https://json-schema.org/draft/2020-12/schema
title: XRD Instrument Detail
description: X-ray Diffraction tabular data with geometry and wavelength
type: object
properties:
  "@type":
    const: "ada:XRDTabular"
  'ada:geometry':
    type: string
  'ada:sampleMount':
    type: string
  'ada:stepSize':
    type: number
  'ada:timePerStep':
    type: number
  'ada:wavelength':
    type: number
