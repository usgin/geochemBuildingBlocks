$schema: https://json-schema.org/draft/2020-12/schema
title: ADA ARGT Product Profile
description: Technique-specific profile for Argon Geochronology and Thermochronology
  (ARGT) products. Extends the base ADA product profile with constraints on valid
  ARGT component types and detailARGT requirements.
allOf:
- $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaProduct/schema.yaml
- type: object
  properties:
    schema:additionalType:
      description: Must include a ARGT product type identifier.
      contains:
        enum:
        - 40Ar/39Ar Geochronology and Thermochronology (ARGT)
        - 40Ar/39Ar geochronology and thermochronology
    schema:distribution:
      description: Distribution items for adaARGT. Archive hasPart items must have
        ada:componentType from technique-specific or universal values.
      type: array
      items:
        type: object
        properties:
          schema:hasPart:
            items:
              type: object
              properties:
                ada:componentType:
                  anyOf:
                  - enum:
                    - ada:ARGTDocument
                    - ada:ARGTCollection
                  - '': ../adaProduct/schema.yaml#//universalComponentType
    schema:subjectOf:
      properties:
        dcterms:conformsTo:
          contains:
            type: object
            properties:
              '@id':
                const: https://w3id.org/geochem/metadata/profiles/adaARGT
x-jsonld-prefixes:
  schema: http://schema.org/
  ada: https://ada.astromat.org/metadata/
  cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
  csvw: http://www.w3.org/ns/csvw#
  prov: http://www.w3.org/ns/prov#
  spdx: http://spdx.org/rdf/terms#
  nxs: http://purl.org/nexusformat/definitions/
  dcterms: http://purl.org/dc/terms/
  geosparql: http://www.opengis.net/ont/geosparql#
