$schema: https://json-schema.org/draft/2020-12/schema
title: ADA VNMIR Product Profile
description: Technique-specific profile for Very-Near Mid-Infrared (VNMIR/FTIR) spectroscopy
  products. Extends the base ADA product profile with constraints on valid VNMIR component
  types and vnmir_detail requirements.
allOf:
- $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaProduct/schema.yaml
- type: object
  properties:
    schema:additionalType:
      description: Must include a VNMIR product type identifier.
      contains:
        enum:
        - Visible, near-infrared, and mid-infrared Spectroscopy (VNMIR) Point
        - Visible, near-infrared, and mid-infrared Spectroscopy (VNMIR) Overview Image
        - Visible, near-infrared, and mid-infrared Spectroscopy (VNMIR) Spectral Map
        - Visible, near-, and mid-infrared spectroscopy
    schema:distribution:
      description: Distribution items for adaVNMIR. Archive hasPart items must have
        ada:componentType from technique-specific or universal values.
      type: array
      items:
        type: object
        properties:
          schema:hasPart:
            items:
              type: object
              properties:
                ada:componentType:
                  anyOf:
                  - enum:
                    - ada:VNMIRSpectralPoint
                    - ada:VNMIROverviewImage
                    - ada:VNMIRSpectralMap
                    - ada:VNMIRSpectraPlot
                  - '': ../adaProduct/schema.yaml#//universalComponentType
    schema:subjectOf:
      properties:
        dcterms:conformsTo:
          contains:
            type: object
            properties:
              '@id':
                const: https://w3id.org/geochem/metadata/profiles/adaVNMIR
x-jsonld-prefixes:
  schema: http://schema.org/
  ada: https://ada.astromat.org/metadata/
  cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
  csvw: http://www.w3.org/ns/csvw#
  prov: http://www.w3.org/ns/prov#
  spdx: http://spdx.org/rdf/terms#
  nxs: http://purl.org/nexusformat/definitions/
  dcterms: http://purl.org/dc/terms/
  geosparql: http://www.opengis.net/ont/geosparql#
