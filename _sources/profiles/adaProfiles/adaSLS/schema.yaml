$schema: https://json-schema.org/draft/2020-12/schema
title: ADA SLS Product Profile
description: Technique-specific profile for Structured Light Scanning (SLS) products. Extends the base ADA product profile
  with constraints on valid SLS component types and detailSLS requirements.
allOf:
- $ref: ../adaProduct/schema.yaml
- type: object
  properties:
    schema:additionalType:
      description: Must include a SLS product type identifier.
      contains:
        enum:
        - Structured Light Scanning (SLS) Individual Scan Collection
        - Structured Light Scanning (SLS) Shape Model
    schema:distribution:
      description: Distribution items for adaSLS. Archive hasPart items must have ada:componentType from technique-specific
        or universal values.
      type: array
      items:
        type: object
        properties:
          schema:hasPart:
            items:
              type: object
              properties:
                ada:componentType:
                  anyOf:
                  - enum:
                    - ada:SLSShapeModel
                    - ada:SLSPartialScan
                    - ada:ShapeModelImage
                  - $ref: '../adaProduct/schema.yaml#/$defs/universalComponentType'
    schema:subjectOf:
      properties:
        dcterms:conformsTo:
          contains:
            type: object
            properties:
              '@id':
                const: 'https://w3id.org/geochem/metadata/profiles/adaSLS'
