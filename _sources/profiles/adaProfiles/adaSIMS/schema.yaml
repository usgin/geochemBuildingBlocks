$schema: https://json-schema.org/draft/2020-12/schema
title: ADA SIMS Product Profile
description: Technique-specific profile for Secondary Ion Mass Spectrometry (SIMS) products. Extends the base ADA product
  profile with constraints on valid SIMS component types.
allOf:
- $ref: ../adaProduct/schema.yaml
- type: object
  properties:
    schema:additionalType:
      description: Must include a SIMS product type identifier.
      contains:
        enum:
        - Secondary Ion Mass Spectrometry (SIMS) Tabular
        - Secondary ion mass spectrometry
    schema:distribution:
      description: Distribution items for adaSIMS. Archive hasPart items must have ada:componentType from technique-specific
        or universal values.
      type: array
      items:
        type: object
        properties:
          schema:hasPart:
            items:
              type: object
              properties:
                ada:componentType:
                  anyOf:
                  - enum:
                    - ada:SIMSTabular
                    - ada:SIMSCollection
                  - ? ''
                    : ../adaProduct/schema.yaml#//universalComponentType
