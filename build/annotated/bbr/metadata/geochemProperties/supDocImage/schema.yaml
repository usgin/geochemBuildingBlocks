$schema: https://json-schema.org/draft/2020-12/schema
title: Supplemental Document Image Type
description: Supplemental document images including analysis location images, annotated
  products, context photography, and other supplemental visual materials.
type: object
properties:
  '@type':
    type: array
    items:
      type: string
    minItems: 2
    allOf:
    - contains:
        const: ada:image
    - contains:
        const: schema:DigitalDocument
    description: GeneralType for supplemental document images
  ada:componentType:
    type: object
    properties:
      '@type':
        enum:
        - ada:analysisLocation
        - ada:annotatedProduct
        - ada:contextPhotography
        - ada:areaOfInterest
        - ada:instrumentMetadata
        - ada:supplementalBasemap
        - ada:other
        - ada:plot
        - ada:quickLook
        - ada:report
        - ada:visImage
    required:
    - '@type'
  ada:numPixelsX:
    type: integer
  ada:numPixelsY:
    type: integer
  schema:isBasedOn:
    type: string
    description: Original file name before PDS4-compliant renaming
required:
- '@type'
- ada:componentType
x-jsonld-prefixes:
  schema: http://schema.org/
  ada: https://ada.astromat.org/metadata/
