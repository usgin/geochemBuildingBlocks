$schema: https://json-schema.org/draft/2020-12/schema
title: ADA NanoIR Product Profile
description: Technique-specific profile for Nano-Infrared Spectroscopy (NanoIR) products. Extends the base ADA product profile
  with constraints on valid NanoIR component types and detailNanoIR requirements.
allOf:
- $ref: ../adaProduct/schema.yaml
- type: object
  properties:
    schema:additionalType:
      description: Must include a NanoIR product type identifier.
      contains:
        enum:
        - Nanoscale Infrared Mapping (NanoIR) Background
        - Nanoscale Infrared Mapping (NanoIR) MapCollection
        - Nanoscale Infrared Mapping (NanoIR) Point Data
        - Nanoscale Infrared Mapping
    schema:distribution:
      description: Distribution items for adaNanoIR. Archive hasPart items must have ada:componentType from technique-specific
        or universal values.
      type: array
      items:
        type: object
        properties:
          schema:hasPart:
            items:
              type: object
              properties:
                ada:componentType:
                  anyOf:
                  - enum:
                    - ada:NanoIRBackground
                    - ada:NanoIRMap
                    - ada:NanoIRMapCollection
                    - ada:NanoIRPointCollection
                  - $ref: '../adaProduct/schema.yaml#/$defs/universalComponentType'
    schema:subjectOf:
      properties:
        dcterms:conformsTo:
          contains:
            type: object
            properties:
              '@id':
                const: 'https://w3id.org/geochem/metadata/profiles/adaNanoIR'
