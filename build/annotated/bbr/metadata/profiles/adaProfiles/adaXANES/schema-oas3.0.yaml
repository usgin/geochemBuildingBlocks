  cdif.bbr.metadata.cdifProperties.cdifArchive:
    title: CDIF Archive Distribution
    description: A DataDownload distribution that is an archive file (e.g. ZIP) containing
      multiple component files described in schema:hasPart. The archive itself is
      typed as schema:DataDownload; each component file is typed as schema:MediaObject
      (not DataDownload, since they are not independently accessible via URL). Components
      may optionally include CDIF data description extensions (cdifTabularData, cdifDataCube)
      to describe their internal data structure.
    type: object
    allOf:
    - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.dataDownload
    - type: object
      properties:
        schema:hasPart:
          type: array
          description: Array describing the files contained in the archive. Each item
            represents a component file that is part of the archive and is not independently
            accessible.
          items:
            allOf:
            - type: object
              properties:
                '@id':
                  type: string
                  description: Identifier for this file, typically a hash-based anchor
                    (e.g. '#abc123'). Used for cross-references from schema:about
                    in metadata sidecar files.
                '@type':
                  type: array
                  description: Must include schema:MediaObject. Must NOT include schema:DataDownload
                    since this file is not independently accessible. May include additional
                    types for categorization.
                  items:
                    type: string
                  contains:
                    enum:
                    - schema:MediaObject
                  not:
                    contains:
                      enum:
                      - schema:DataDownload
                  minItems: 1
                schema:name:
                  type: string
                  description: Filename of the component file within the archive.
                schema:description:
                  type: string
                  description: Description of the file content. May include checksum
                    information.
                schema:encodingFormat:
                  type: array
                  description: MIME type(s) for this file.
                  items:
                    type: string
                schema:size:
                  type: object
                  description: File size as a QuantitativeValue.
                  properties:
                    '@type':
                      type: array
                      items:
                        type: string
                      contains:
                        enum:
                        - schema:QuantitativeValue
                      minItems: 1
                    schema:value:
                      type: number
                      description: Numeric size value.
                    schema:unitText:
                      type: string
                      description: Unit of measure for size (e.g. 'byte').
                schema:about:
                  type: array
                  description: For metadata sidecar files, references the data file
                    this metadata describes.
                  items:
                    type: object
                    properties:
                      '@id':
                        type: string
                        description: Reference to the @id of the data file described
                          by this sidecar.
                spdx:checksum:
                  type: object
                  description: Checksum for integrity verification of this component
                    file.
                  properties:
                    '@type':
                      type: array
                      items:
                        type: string
                      contains:
                        enum:
                        - spdx:Checksum
                      minItems: 1
                    spdx:algorithm:
                      type: string
                    spdx:checksumValue:
                      type: string
                  required:
                  - '@type'
              required:
              - '@type'
              - schema:name
              - schema:encodingFormat
            - anyOf:
              - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifDataCube
              - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifTabularData
              - {}
    x-jsonld-prefixes:
      schema: http://schema.org/
      spdx: http://spdx.org/rdf/terms#
      cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
      csvw: http://www.w3.org/ns/csvw#
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifArchive/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
