x-defs:
  ada.bbr.metadata.profiles.adaProfiles.adaProduct:
    title: Astromat Archive Product Metadata
    description: Schema for JSON metadata documenting products in Astromat Data Archive
      (ADA). Each project consists of one or more data files and 0 to many supplemental
      files. Each file MUST have an associated YAML metadata file, with the same name,
      but '.yaml' as the file extension. Version 3.0 aligned with CDIF 2026 schema
      for DDI-CDI variable types and CSVW tabular data properties.
    type: object
    allOf:
    - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore
    - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifDataDescription
    - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifArchiveDistribution
    - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifProvenance
    - type: object
      properties:
        '@type':
          type: array
          items:
            type: string
            enum:
            - schema:Dataset
            - schema:Product
        schema:additionalType:
          type: array
          description: Should have the ada product type and 'ada:DataDeliveryPackage'
          items:
            type: string
          contains:
            enum:
            - 40Ar/39Ar Geochronology and Thermochronology (ARGT)
            - 40Ar/39Ar geochronology and thermochronology
            - Accelerator Mass Spectrometry (AMS)
            - Accelerator Mass Spectrometry
            - Advanced Imaging and Visualization of Astromaterials (AIVA)
            - Analysis Advanced Imaging and Visualization of Astromaterials (AIVA)
            - Basemap
            - Differential Scanning Calorimetry (DSC)
            - Differential Scanning Calorimetry
            - Electron Microprobe Analysis (EMPA) Collection
            - Electron Microprobe Analysis Image (EMPA)
            - Electron Microprobe Analysis Quantitative Elemental Abundances (EMPAQEA)
            - Electron Microprobe Analysis (EMPA)
            - Electron microprobe analysis
            - Elemental Analysis-Isotope Ratio Mass Spectrometry (EA-IRMS)
            - Elemental analysis - isotope ratio mass spectrometry
            - Fluorescence Microscopy (UVFM) Image
            - UV Fluorescence Microscopy
            - Fourier Transform Ion Cyclotron Resonance Mass Spectrometry (FTICRMS)
              Cube
            - Fourier Transform Ion Cyclotron Resonance Mass Spectrometry (FTICRMS)
              Tabular
            - Fourier Transform Ion Cyclotron Resonance Mass Spectrometry
            - Gas Chromatography-Mass Spectrometry (GCMS)
            - Gas Chromatography-Mass Spectrometry
            - Gas Pycnometry (GPYC) Processed
            - Gas Pycnometry (GPYC) Raw
            - Gas pycnometry
            - High-resolution Inductively Coupled Plasma Mass Spectroscopy (HRICPMS)
              Processed
            - High-resolution Inductively Coupled Plasma Mass Spectroscopy (HRICPMS)
              Raw
            - High-resolution inductively coupled plasma mass spectrometry
            - Inductively Coupled Plasma - Optical Emission Spectroscopy (ICPOES)
              Intermediate
            - Inductively Coupled Plasma - Optical Emission Spectroscopy (ICPOES)
              Processed
            - Inductively Coupled Plasma - Optical Emission Spectroscopy (ICPOES)
              Raw
            - Inductively coupled plasma - optical emission spectrometry
            - Ion Chromatography (IC)
            - Ion Chromatography
            - Laser Assisted Fluorination (LAF) Processed
            - Laser Assisted Fluorination (LAF) Raw
            - Liquid Chromatography - Mass Spectrometry (LCMS) Collection
            - Liquid Chromatography-Mass Spectrometry
            - Lock-In Thermography (LIT) Collection
            - Lock-In Thermography (LIT) image
            - Lock-In Thermography
            - Microprobe Two-Step Laser Mass Spectrometry (L2MS)
            - Microprobe Two-Step Laser Mass Spectrometry
            - Multi-Collector Inductively Coupled Plasma Mass Spectrometry (MCICPMS)
              processed
            - Multi-Collector Inductively Coupled Plasma Mass Spectrometry (MCICPMS)
              Raw
            - Multi-Collector Inductively Coupled Plasma Mass Spectrometry
            - Nanoscale Infrared Mapping (NanoIR) Background
            - Nanoscale Infrared Mapping (NanoIR) MapCollection
            - Nanoscale Infrared Mapping (NanoIR) Point Data
            - Nanoscale Infrared Mapping
            - Nanoscale Secondary Ion Mass Spectrometry (NanoSIMS) Image
            - Nanoscale Secondary Ion Mass Spectrometry (NanoSIMS) Raw
            - Nanoscale Secondary Ion Mass Spectrometry (NanoSIMS) Tabular
            - Nanoscale secondary ion mass spectrometry
            - Noble Gas and Nitrogen Static Mass Spectrometry (NGNSMS) Raw
            - Noble Gas and Nitrogen Static Mass Spectrometry (NGNSMS) Processed
            - Noble gas and Nitrogen Static Mass Spectrometry
            - Particle Size Frequency Distribution (PSFD)
            - Particle Size Frequency Distribution
            - Quadrupole Inductively Coupled Plasma Mass Spectrometry (QICPMS) Processed
            - Quadrupole Inductively Coupled Plasma Mass Spectrometry (QICPMS) Raw
            - Quadrupole Inductively Coupled Plasma Mass Spectrometry
            - Quantitative Reflective Imaging System (QRIS)
            - Quantitative Reflective Imaging System (QRIS) Calibrated
            - Raman vibrational spectroscopy
            - Resonance ionization time of flight noble gas mass spectrometry (RITOFNGMS)
              Processed
            - Resonance ionization time of flight noble gas mass spectrometry (RITOFNGMS)
              Spectra
            - Resonance ionization time of flight noble gas mass spectrometry
            - Scanning Electron Microscopy (SEM) Image
            - Scanning Electron Microscopy Electron Backscatter Diffraction (SEMEBSD)
              Grain Image
            - Scanning Electron Microscopy Energy Dispersive X-ray Spectroscopy (SEMEDS)
              Point Data
            - Scanning Electron Microscopy Energy Dispersive X-ray Spectroscopy (SEMEDS)
              image
            - Scanning Electron Microscopy High Resolution Cathodoluminescence (SEMHRCL)
              image
            - Scanning electron microscopy
            - Focused ion beam-scanning electron microscopy
            - Scanning Transmission Electron Microscopy (STEM) Image
            - Scanning Transmission Electron Microscopy Electron Energy-loss Spectra
              (STEMEELS) Cube
            - Scanning Transmission Electron Microscopy Electron Energy-loss Spectra
              (STEMEELS) Tabular
            - Scanning Transmission Electron Microscopy Energy Dispersive X-ray Spectroscopy
              (STEMEDS) Cube
            - Scanning Transmission Electron Microscopy Energy Dispersive X-ray Spectroscopy
              (STEMEDS) Tabular
            - Scanning Transmission Electron Microscopy Energy Dispersive X-ray Spectroscopy
              (STEMEDS) Tomography
            - Secondary Ion Mass Spectrometry (SIMS) Tabular
            - Secondary ion mass spectrometry
            - Seismic Velocities and Rock Ultrasonic Elastic Constants (SVRUEC)
            - Seismic Velocities and Rock Ultrasonic Elastic Constants
            - Structured Light Scanning (SLS) Individual Scan Collection
            - Structured Light Scanning (SLS) Shape Model
            - Structured Light Scanning
            - Time-of-flight secondary ion mass spectrometry (TOFSIMS)
            - Transmission Electron Microscopy (TEM) Image
            - Transmission Electron Microscopy (TEM) Patterns Image
            - Transmission Electron Microscopy
            - Visible Light Microscopy (VLM) Image
            - Visible Light Microscopy
            - Visible, near-infrared, and mid-infrared Spectroscopy (VNMIR) Point
            - Visible, near-, and mid-infrared spectroscopy
            - X-ray Absorption Near Edge Structure Hyperspectral Image Stack (XANES)
            - X-ray absorption near edge structure (XANES) spectroscopy
            - X-ray Computed Tomography (XCT) Image Collection
            - X-ray computed tomography
            - X-ray Diffraction (XRD) Tabular
            - X-ray diffraction
          minItems: 2
        submissionType:
          type: string
        schema:license:
          description: Legal statement of conditions for use and access
          type: array
          minItems: 0
          items:
            anyOf:
            - type: string
            - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/ada.bbr.metadata.geochemProperties.creativeWork
        schema:relatedLink:
          type: array
          description: Links to related resources at the product level
          items:
            type: object
            properties:
              '@type':
                type: array
                items:
                  type: string
                contains:
                  enum:
                  - schema:LinkRole
                minItems: 1
              schema:linkRelationship:
                type: string
              schema:target:
                type: object
                properties:
                  '@type':
                    type: array
                    items:
                      type: string
                    contains:
                      enum:
                      - schema:EntryPoint
                    minItems: 1
                  schema:encodingFormat:
                    type: string
                  schema:name:
                    type: string
                  schema:url:
                    type: string
        schema:creativeWorkStatus:
          type: string
        schema:measurementTechnique:
          type: object
          description: Text description of the measurement method
          properties:
            '@type':
              type: array
              items:
                type: string
              contains:
                enum:
                - schema:DefinedTerm
              minItems: 1
            schema:name:
              type: string
            schema:identifier:
              type: string
        prov:wasGeneratedBy:
          description: ADA analysis events. Extends cdifProvActivity (from cdifProvenance)
            with ADA-specific instrument, laboratory, and sample properties.
          type: array
          items:
            type: object
            properties:
              prov:used:
                type: array
                description: Instruments used in the analysis
                items:
                  $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/ada.bbr.metadata.geochemProperties.instrument
              schema:location:
                $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/ada.bbr.metadata.geochemProperties.laboratory
              schema:mainEntity:
                type: array
                description: Samples analyzed
                items:
                  type: object
                  properties:
                    '@type':
                      type: array
                      items:
                        type: string
                      allOf:
                      - contains:
                          enum:
                          - schema:Thing
                      - contains:
                          enum:
                          - https://w3id.org/isample/vocabulary/materialsampleobjecttype/materialsample
                      minItems: 2
                    schema:additionalType:
                      type: array
                      items:
                        type: string
                    schema:identifier:
                      type: array
                      items:
                        type: string
              schema:startDate:
                type: string
            required:
            - prov:used
        schema:variableMeasured:
          description: ADA variable definitions. Extends cdifVariableMeasured (from
            cdifDataDescription) with additional ADA properties. Requires description
            with minLength 10.
          type: array
          items:
            type: object
            properties:
              schema:description:
                type: string
                minLength: 10
              schema:alternateName:
                type: array
                items:
                  type: string
                  description: Human intelligible name for variable that conveys semantics
              schema:measurementTechnique:
                anyOf:
                - type: string
                - type: object
                  properties:
                    '@id':
                      type: string
                - type: object
                  properties:
                    '@type':
                      type: array
                      items:
                        type: string
                      contains:
                        enum:
                        - schema:DefinedTerm
                      minItems: 1
                    schema:name:
                      type: string
                  required:
                  - '@type'
                  - schema:name
              schema:unitText:
                type: string
              schema:unitCode:
                anyOf:
                - type: string
                - type: object
                  properties:
                    '@id':
                      type: string
                - type: object
                  properties:
                    '@type':
                      type: array
                      items:
                        type: string
                      contains:
                        enum:
                        - schema:DefinedTerm
                      minItems: 1
                    schema:name:
                      type: string
                  required:
                  - '@type'
                  - schema:name
              schema:minValue:
                type: number
              schema:maxValue:
                type: number
              schema:url:
                type: string
                format: uri
            required:
            - schema:description
        schema:spatialCoverage:
          description: Geographic extent of resource content.
          type: array
          items:
            $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/ada.bbr.metadata.profiles.adaProfiles.adaProduct/$defs/SpatialExtent
        schema:temporalCoverage:
          description: Temporal extent of resource content.
          type: array
          items:
            $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/ada.bbr.metadata.profiles.adaProfiles.adaProduct/$defs/TemporalExtent
        dqv:hasQualityMeasurement:
          description: Quality measurements reported to assess the resource.
          type: array
          items:
            $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/ada.bbr.metadata.profiles.adaProfiles.adaProduct/$defs/QualityMeasure
        schema:distribution:
          description: Distribution inherits from cdifCore (DataDownload, WebAPI)
            and cdifArchiveDistribution (archive with hasPart). ADA file-type classification
            uses ada:componentType on hasPart items.
          type: array
          items:
            type: object
            properties:
              schema:hasPart:
                items:
                  allOf:
                  - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/ada.bbr.metadata.geochemProperties.files
                  - type: object
                    properties:
                      ada:componentType:
                        type: string
                        description: ADA file type classification. Values are restricted
                          by technique-specific profiles. Universal types (e.g. ada:calibrationFile,
                          ada:report) are valid across all techniques.
        schema:subjectOf:
          properties:
            dcterms:conformsTo:
              contains:
                type: object
                properties:
                  '@id':
                    enum:
                    - https://w3id.org/geochem/metadata/profiles/adaProduct
    $defs:
      SpatialExtent:
        $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.spatialExtent
      TemporalExtent:
        $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.temporalExtent
      QualityMeasure:
        $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.qualityProperties.qualityMeasure
      universalComponentType:
        description: Component type values valid across all ADA techniques. Used in
          ada:componentType on hasPart items.
        enum:
        - ada:analysisLocation
        - ada:annotatedImage
        - ada:areaOfInterest
        - ada:basemap
        - ada:calibrationFile
        - ada:code
        - ada:contextPhotography
        - ada:contextVideo
        - ada:inputFile
        - ada:instrumentMetadata
        - ada:logFile
        - ada:methodDescription
        - ada:other
        - ada:plot
        - ada:processingMethod
        - ada:quickLook
        - ada:report
        - ada:samplePreparation
        - ada:shapefile
        - ada:supplementalBasemap
        - ada:supplementaryImage
        - ada:worldFile
    x-jsonld-prefixes:
      schema: http://schema.org/
      ada: https://ada.astromat.org/metadata/
      cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
      csvw: http://www.w3.org/ns/csvw#
      prov: http://www.w3.org/ns/prov#
      spdx: http://spdx.org/rdf/terms#
      nxs: http://purl.org/nexusformat/definitions/
      dcterms: http://purl.org/dc/terms/
      geosparql: http://www.opengis.net/ont/geosparql#
    x-schema-source: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaProduct/schema.yaml
    x-schema-id: https://w3id.org/adaJSONLD/schema/3.0
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.cdifProperties.cdifCore:
    type: object
    title: 'Core properties for CDIF metadata schema, with schema: prefixes'
    description: Building block specifies core properties for CDIF schema.org metadata
      record, applicable to any resource type.
    properties:
      '@context':
        type: object
        description: JSON-LD context declaring namespace prefixes used in the metadata
          record.
        properties:
          schema:
            enum:
            - http://schema.org/
          dcterms:
            enum:
            - http://purl.org/dc/terms/
          spdx:
            enum:
            - http://spdx.org/rdf/terms#
          dcat:
            enum:
            - http://www.w3.org/ns/dcat#
          prov:
            enum:
            - http://www.w3.org/ns/prov#
        required:
        - schema
        - dcterms
        - dcat
        - prov
      '@id':
        type: string
        description: 'The URI for the resource should be the @id value for the root
          of the JSON instance document tree. Must be an IRI (e.g. https://doi.org/...,
          urn:..., or a relative URI like #localid). Note that this identifier can
          be interpreted to identify the resource that is the subject of this metadata
          record, or the JSON-LD object that is the digital object containing the
          metadata information.'
      '@type':
        description: a schema.org Class that specifies the expected information content
          for the metadata record. The array must include at least one schema.org
          type value. Default is schema:Dataset.
        type: array
        items:
          type: string
          enum:
          - schema:CreativeWork
          - schema:SoftwareApplication
          - schema:SoftwareSourceCode
          - schema:Product
          - schema:WebAPI
          - schema:Dataset
          - schema:DigitalDocument
          - schema:Collection
          - schema:ImageObject
          - schema:DataCatalog
          - schema:DefinedTermSet
          - schema:MediaObject
        default: schema:Dataset
        minItems: 1
        contains:
          enum:
          - schema:Dataset
      schema:name:
        type: string
        description: A descriptive name of a dataset (e.g., 'Snow depth in Northern
          Hemisphere'). The name should uniquely identify the described resource for
          human use, in the scope of the metadata catalog containing this metadata
          record.
      schema:description:
        type: string
        description: A short summary describing a dataset. This text will be indexed
          by search applications, so the more information here, the better.
      schema:identifier:
        description: The primary identifier for the dataset; other identifiers should
          be listed in the sameAs field. Schema.org has three ways of encoding identifiers--
          a text description, a URL, or by using the schema:PropertyValue field. The
          Science on Schema.org guidance strongly recommends using the PropertyValue
          approach. see https://github.com/ESIPFed/science-on-schema.org   .... Dataset.md#identifier.  Ideally,
          for any given data provided they would provide identifiers either all as
          strings or all as identifier_type.
        anyOf:
        - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Identifier
        - type: string
      schema:additionalType:
        description: identifiers for datatypes from other vocabularies (not schema.org)
          that apply to this metadata.
        type: array
        minItems: 0
        items:
          anyOf:
          - type: string
          - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/DefinedTerm
      schema:sameAs:
        description: Other identifiers for the dataset, as IRI references, literal
          strings, or structured identifiers using schema:PropertyValue.
        type: array
        minItems: 1
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: IRI for an equivalent resource or alternate identifier
          - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Identifier
      schema:version:
        description: The version number or identifier for this dataset (text or numeric).
          The values should sort from oldest to newest using an alphanumeric sort
          on version strings
        anyOf:
        - type: string
        - type: number
      schema:inLanguage:
        type: string
        description: the language of the dataset content
      schema:dateModified:
        type: string
        description: ISO8601 formatted date (and optional time if relevant) when Dataset
          was last updated
      schema:datePublished:
        type: string
        description: ISO8601 formatted date (and optional time if relevant) when Dataset
          was made public.
      schema:conditionsOfAccess:
        description: 'text statement of conditions for use and access; if an online
          resource documents the restrictions or a URI is used to identify the conditions,
          recommend using schema:CreativeWork to provide a label (name) and an identifier
          (URI or URL). '
        type: array
        minItems: 0
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: a reference to a resource defining conditions of Access
          - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/LabeledLink
      schema:license:
        description: 'legal statement of conditions for use and access; recommend
          using schema:CreativeWork to provide a label (name) for the license, and
          an identifier. Sources of license identifiers: https://opensource.org/licenses/,
          https://creativecommons.org/about/cclicenses/, https://spdx.org/licenses/,
          http://cor.esipfed.org/ont/earthcube/swl. If only a string is provided,
          it should be an identifier for the license, ideally a resolvable URI'
        type: array
        minItems: 0
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: a reference to a license defintion
          - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/LabeledLink
      schema:url:
        type: string
        format: uri
        description: Web Location of a page describing the dataset (landing page),
          typically providing links or instructions to get the actual resource content;
          analogous to dcat:accessURL. If a direct link is available to get the data,
          put in distribution/contentUrl
      schema:distribution:
        description: specifies how to download the data in a specific format or access
          via a web API. This property describes where to get the data and in what
          format by using the schema:DataDownload type. If user must access data through
          a landing page, provide link to landing page in the 'url' property for the
          dataset
        type: array
        items:
          anyOf:
          - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/DataDownload
          - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/WebAPI
      schema:relatedLink:
        type: array
        description: links to related resources; linkRelationship specifies how the
          resource is related.
        items:
          type: object
          properties:
            '@type':
              type: array
              items:
                type: string
              contains:
                enum:
                - schema:LinkRole
              minItems: 1
            schema:linkRelationship:
              anyOf:
              - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/DefinedTerm
              - type: string
            schema:target:
              type: object
              properties:
                '@type':
                  type: array
                  items:
                    type: string
                  contains:
                    enum:
                    - schema:EntryPoint
                  minItems: 1
                schema:encodingFormat:
                  type: string
                  description: registered MIME types are expected
                schema:name:
                  type: string
                schema:url:
                  type: string
                  format: uri
      schema:publishingPrinciples:
        description: FDOF digitalObjectMutability, RDA digitalObjectPolicy, FDOF PersistencyPolicy.
          Policies related to maintenance, update, expected time to live. If an online
          resource documents the policies or a URI is used to identify the conditions,
          recommend using schema:CreativeWork to provide a label (name) and an identifier
          (URI or URL).
        type: array
        minItems: 0
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: a reference to a publishing principles statement
          - $ref: https://usgin.github.io/geochemBuildingBlocks/build/annotated/bbr/metadata/profiles/adaProfiles/adaXANES/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/LabeledLink
      schema:keywords:
        description: Keywords are an array of strings, an array of schema:DefinedTerms,
          or some combination of these. If you have information about a controlled
