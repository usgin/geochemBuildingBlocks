$schema: https://json-schema.org/draft/2020-12/schema
title: ADA XRD Product Profile
description: Technique-specific profile for X-ray Diffraction (XRD) products. Extends the base ADA product profile with constraints
  on valid XRD component types and xrd_detail requirements.
allOf:
- $ref: ../adaProduct/schema.yaml
- type: object
  properties:
    schema:additionalType:
      description: Must include an XRD product type identifier.
      contains:
        enum:
        - X-ray Diffraction (XRD) Tabular
        - X-ray diffraction
    schema:distribution:
      description: Distribution items for adaXRD. Archive hasPart items must have ada:componentType from technique-specific
        or universal values.
      type: array
      items:
        type: object
        properties:
          schema:hasPart:
            items:
              type: object
              properties:
                ada:componentType:
                  anyOf:
                  - enum:
                    - ada:XRDTabular
                    - ada:XRDDiffractionPattern
                    - ada:XRDIndexedImage
                  - $ref: '../adaProduct/schema.yaml#/$defs/universalComponentType'
    schema:subjectOf:
      properties:
        dcterms:conformsTo:
          contains:
            type: object
            properties:
              '@id':
                const: 'https://w3id.org/geochem/metadata/profiles/adaXRD'
